{% extends "base.html" %}
{% load humanize %}

{% block body %}
<div class="min-h-screen bg-zinc-50">
  <header class="bg-zinc-900 text-white">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-md bg-blue-600 flex items-center justify-center"><i class="ph-bold ph-graduation-cap text-xl"></i></div>
        <div>
          <div class="font-display font-bold">{{ school.name|default:"Academy ERP" }}</div>
          <div class="text-[10px] uppercase tracking-widest text-white/60">Parent Portal</div>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <span class="text-white/70">Hi, <span data-testid="parent-name">{{ user.display_name }}</span></span>
        <form action="/api/logout/" method="post" class="inline">
          {% csrf_token %}
          <button type="submit" data-testid="parent-logout-btn" class="text-white/80 hover:text-white"><i class="ph ph-sign-out mr-1"></i>Sign out</button>
        </form>
      </div>
    </div>
  </header>
  {% block portal_content %}{% endblock %}
</div>
{% endblock %}
