{% if url == request.path %}
  <a href="{{ url }}" data-testid="{{ tid }}" class="flex items-center gap-3 px-3 py-2 rounded-md bg-blue-600 text-white font-medium transition-colors">
    <i class="ph {{ icon }} text-base"></i>
    <span>{{ label }}</span>
  </a>
{% else %}
  <a href="{{ url }}" data-testid="{{ tid }}" class="flex items-center gap-3 px-3 py-2 rounded-md text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors">
    <i class="ph {{ icon }} text-base"></i>
    <span>{{ label }}</span>
  </a>
{% endif %}
