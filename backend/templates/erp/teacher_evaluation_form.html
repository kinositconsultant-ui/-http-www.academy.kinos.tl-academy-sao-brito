{% extends "teacher_base.html" %}
{% block title %}New Evaluation{% endblock %}
{% block portal_content %}
<main class="max-w-3xl mx-auto px-6 py-10" data-testid="teacher-eval-form">
  <div class="text-[11px] uppercase tracking-widest text-zinc-500">Counselling</div>
  <h1 class="font-display text-3xl font-bold text-zinc-900 tracking-tight">Write evaluation / advice</h1>

  <form method="post" class="mt-6 bg-white rounded-lg border border-zinc-200 p-6 space-y-5">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">Student *</label>
      <select name="student" required data-testid="eval-student-select"
        class="w-full rounded-md border-0 py-2 px-3 text-sm shadow-sm ring-1 ring-inset ring-zinc-300 focus:ring-2 focus:ring-red-700">
        <option value="">— pick a student —</option>
        {% for s in students %}<option value="{{ s.id }}">{{ s.full_name }} ({{ s.admission_no }} · {{ s.school_class }})</option>{% endfor %}
      </select>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-zinc-700 mb-1">Semester</label>
        <select name="semester" class="w-full rounded-md border-0 py-2 px-3 text-sm shadow-sm ring-1 ring-inset ring-zinc-300 focus:ring-2 focus:ring-red-700">
          <option value="s1">Semester 1</option><option value="s2">Semester 2</option><option value="s3">Semester 3</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-700 mb-1">Category</label>
        <select name="category" data-testid="eval-category-select"
          class="w-full rounded-md border-0 py-2 px-3 text-sm shadow-sm ring-1 ring-inset ring-zinc-300 focus:ring-2 focus:ring-red-700">
          <option value="academic">Academic</option>
          <option value="behaviour">Behaviour</option>
          <option value="counselling">Counselling</option>
          <option value="recognition">Recognition / Praise</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">Comment *</label>
      <textarea name="comment" rows="5" required data-testid="eval-comment-input"
        placeholder="Observations on the student's performance, behaviour, or wellbeing..."
        class="w-full rounded-md border-0 py-2 px-3 text-sm shadow-sm ring-1 ring-inset ring-zinc-300 focus:ring-2 focus:ring-red-700"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">Recommendation / advice</label>
      <textarea name="recommendation" rows="3" data-testid="eval-rec-input"
        placeholder="What should the student / parent do next?"
        class="w-full rounded-md border-0 py-2 px-3 text-sm shadow-sm ring-1 ring-inset ring-zinc-300 focus:ring-2 focus:ring-red-700"></textarea>
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" name="visible_to_parent" id="vtp" checked
        class="rounded border-zinc-300 text-red-700 focus:ring-red-700" />
      <label for="vtp" class="text-sm text-zinc-700">Show this note to the parent in their portal</label>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <a href="/api/teacher/evaluations/" class="inline-flex items-center rounded-md ring-1 ring-zinc-300 px-4 py-2 text-sm text-zinc-700 hover:bg-zinc-100">Cancel</a>
      <button type="submit" data-testid="eval-save-btn"
        class="inline-flex items-center rounded-md bg-red-700 px-4 py-2 text-sm font-semibold text-white hover:bg-red-800">
        <i class="ph-bold ph-check mr-2"></i> Save evaluation
      </button>
    </div>
  </form>
</main>
{% endblock %}
